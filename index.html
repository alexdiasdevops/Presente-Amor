<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }
    .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    .tela { display: none; position: absolute; width: 100%; height: 100%; align-items: center; justify-content: center; z-index: 1; padding: 20px; text-align: center; }
    .ativa { display: flex; flex-direction: column; }
    .coracao-grande { width: 50%; max-width: 250px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .texto { max-width: 700px; font-size: 1.4rem; line-height: 1.8; color: #fff; }
    .mensagem-escolha { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: #e63946; }
    #btn-quiz { display: none; margin-top: 30px; padding: 15px 40px; background: #e63946; border: none; color: white; border-radius: 50px; font-size: 1.3rem; cursor: pointer; animation: pulse 2s infinite; }
    .quiz-box { width: 90%; max-width: 500px; background: #222; padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(230, 57, 70, 0.3); }
    .quiz-btn { display: block; width: 100%; margin: 15px 0; padding: 18px; background: #333; border: 2px solid #e63946; color: white; border-radius: 15px; cursor: pointer; font-size: 1.1rem; }
    #slider { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div id="tela-loading" class="tela ativa">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/Love_Heart_SVG.svg" class="coracao-grande">
    <p style="margin-top: 30px; font-size: 1.2rem;">Carregando nossa história...</p>
  </div>
  <div id="tela-historia" class="tela">
    <div id="texto1" class="texto"></div>
  </div>
  <div id="tela-escolha" class="tela">
    <div class="mensagem-escolha">Sabe porque eu escolhi você?</div>
  </div>
  <div id="tela-segundo" class="tela">
    <div id="texto2" class="texto"></div>
    <button id="btn-quiz" onclick="iniciarQuiz()">Vamos brincar?</button>
  </div>
  <div id="tela-quiz" class="tela">
    <div class="quiz-box">
      <h2 id="quiz-titulo" style="font-family: 'Dancing Script', cursive; color: #e63946; margin-bottom: 25px;">Quiz</h2>
      <div id="quiz-pergunta" style="margin-bottom: 25px; font-size: 1.2rem;"></div>
      <div id="quiz-opcoes"></div>
    </div>
  </div>
  <div id="tela-final" class="tela">
    <h2 style="font-size: 3rem;">Você acertou...</h2>
    <p style="font-size: 1.5rem;">Porque a nossa história já estava traçada. Te amo pra caralho, minha nega.</p>
  </div>
  <div id="tela-galeria" class="tela">
    <div id="slider"></div>
  </div>
  <script>
    const fotos = ["foto1.jpg", "foto2.jpg", "foto3.jpg"];
    const stars = document.getElementById('stars');
    for(let i=0; i<80; i++) {
      const s = document.createElement('div');
      s.className = 'star'; s.style.left = Math.random()*100 + '%'; s.style.top = Math.random()*100 + '%';
      s.style.width = s.style.height = Math.random()*3 + 'px';
      s.style.setProperty('--duration', (Math.random()*3+1) + 's');
      stars.appendChild(s);
    }
    setTimeout(() => {
      document.getElementById('tela-loading').classList.remove('ativa');
      document.getElementById('tela-historia').classList.add('ativa');
      new Typewriter(document.getElementById('texto1'), { delay: 60 })
        .typeString("Dia 19 de dezembro, o dia em que fui presenteado por Deus... Naquela confraternização, não te notei, mas já estava traçada a nossa história. Sentado no barzinho, quando ficamos a sós, eu comecei a te enxergar... Você me encantou no primeiro instante.<br><br>A gente se beijou e ali eu já senti uma coisa inexplicável. Mas a certeza de que eu estava apaixonado e lascado mesmo foi no dia 27, no Terminal Itaquera. Quando eu virei a esquina e te vi de longe, uma morena pequena, toda de preto... meu coração disparou.<br><br>Hoje, a nossa ligação antes de dormir virou o meu ritual sagrado. Ana, eu amo você e não vejo o meu futuro sem você. Meu maior sonho agora é construir a nossa vida e te esperar no altar para poder cuidar de você para sempre.")
        .pauseFor(2000).callFunction(() => {
          document.getElementById('tela-historia').classList.remove('ativa');
          document.getElementById('tela-escolha').classList.add('ativa');
          setTimeout(() => {
            document.getElementById('tela-escolha').classList.remove('ativa');
            document.getElementById('tela-segundo').classList.add('ativa');
            new Typewriter(document.getElementById('texto2'), { delay: 60 })
              .typeString("Amor, quando a gente realmente ama alguém, acaba amando essa pessoa duas vezes. A primeira vez é fácil: você se apaixona pelo sorriso. Mas com o tempo você percebe o resto. As inseguranças, os traumas, os medos.<br><br>Mas, se você escolhe ficar, nasce o segundo amor. Eu quero que você saiba que eu já vivo esse segundo amor por você. Eu nunca vou desistir de nós e da nossa vida juntos. Feliz Dia dos Namorados, meu amor.")
              .callFunction(() => { document.getElementById('btn-quiz').style.display = 'block'; }).start();
          }, 3000);
        }).start();
    }, 5000);
    const perguntas = [
      { q: "Lá no dia 19 de dezembro, quem quase estragou a própria história de amor porque ia pro Itaim?", opt: ["O Alex", "A Ana"], ans: 0 },
      { q: "Depois daquele primeiro beijo inexplicável, quem teve pique para arrastar o outro para um forró até as 5 da manhã?", opt: ["Os dois", "Ninguém"], ans: 0 },
      { q: "No dia 27, quem mandou a famosa frase: 'Se eu chegar e você não estiver, eu vou embora'?", opt: ["O Alex", "A Ana"], ans: 1 },
      { q: "Quem é que não consegue de jeito nenhum terminar o dia bem e ir dormir sem a sagrada ligação de boa noite?", opt: ["O Alex", "A Ana"], ans: 0 },
      { q: "O Momento da Verdade: Qual foi o exato momento em que a ficha caiu e eu tive a certeza absoluta de que estava lascado por você?", opt: ["No forró", "Terminal Itaquera"], ans: 1 },
      { q: "O Nosso Lar: Qual é a minha maior ansiedade agora que vamos morar juntos?", opt: ["Poder te dar bom dia olhando nos seus olhos", "Não precisar mais dirigir"], ans: 0 },
      { q: "O Segundo Amor: O que significa viver o 'Segundo Amor' com você?", opt: ["Amar a versão divertida", "Escolher você mesmo nos dias difíceis"], ans: 1 },
      { q: "O Futuro: Qual é o meu maior sonho de vida hoje?", opt: ["Viajar o mundo", "Casar perante a Deus"], ans: 1 }
    ];
    let qIdx = 0;
    function iniciarQuiz() { document.getElementById('tela-segundo').classList.remove('ativa'); document.getElementById('tela-quiz').classList.add('ativa'); renderQuiz(); }
    function renderQuiz() {
      if(qIdx >= perguntas.length) { 
        document.getElementById('tela-quiz').classList.remove('ativa'); document.getElementById('tela-final').classList.add('ativa');
        setTimeout(() => { document.getElementById('tela-final').classList.remove('ativa'); document.getElementById('tela-galeria').classList.add('ativa'); startGal(); }, 4000);
        return; 
      }
      document.getElementById('quiz-pergunta').innerText = perguntas[qIdx].q;
      const optDiv = document.getElementById('quiz-opcoes'); optDiv.innerHTML = '';
      perguntas[qIdx].opt.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'quiz-btn'; b.innerText = o;
        b.onclick = () => { if(i === perguntas[qIdx].ans) { qIdx++; renderQuiz(); } else { alert('Tenta de novo!'); } };
        optDiv.appendChild(b);
      });
    }
    function startGal() {
      let i = 0; const s = document.getElementById('slider');
      setInterval(() => {
        s.style.opacity = 0;
        setTimeout(() => { s.style.backgroundImage = `url(${fotos[i]})`; s.style.opacity = 1; i = (i + 1) % fotos.length; }, 1000);
      }, 4000);
    }
  </script>
</body>
</html>
